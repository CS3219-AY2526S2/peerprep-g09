version: '3.8'

services:
  # 1. Redis Database
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  # 2. Question Service

  # 2. Question Service
  question-service:
    build: ./services/question-service
    ports:
      - "8081:8081"
  
  # 3. Matching Service
  matching-service:
    build: ./services/matching-service
    ports:
      - "8082:8082"
    environment:
      - REDIS_URL=redis://redis:6379
      - QUESTION_SERVICE_URL=http://question-service:8081 # Adjust if needed
    depends_on:
      - redis
      - question-service

  # 4. Collaboration Service
  collaboration-service:
    build: ./services/collaboration-service
    ports:
      - "8084:8084"

  # 5. Yjs Websocket Sync Service
  yjs-websocket:
    build: ./services/collaboration-service
    command: ["npx", "y-websocket-server", "--port", "1234"]
    ports:
      - "1234:1234"

  # 6. Frontend (Next.js)
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_MATCHING_SERVICE_URL=http://localhost:8082
      - NEXT_PUBLIC_COLLAB_SERVICE_URL=http://localhost:8084
    volumes:
      - ./frontend:/app
      - /app/node_modules # Don't overwrite node_modules with local ones
    depends_on:
      - matching-service
      - collaboration-service
      - yjs-websocket
