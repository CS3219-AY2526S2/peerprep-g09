services:
  # 1. Redis Database
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  # 2. Question Service
  question-service:
    build: ./services/question-service
    ports:
      - "8081:8081"
  
  # 3. Matching Service
  matching-service:
    build: ./services/matching-service
    ports:
      - "8082:8082"
    environment:
      - REDIS_URL=redis://redis:6379
      - QUESTION_SERVICE_URL=http://question-service:8081 # Adjust if needed
    depends_on:
      - redis
      - question-service

  # 4. Collaboration Service
  collaboration-service:
    build: ./services/collaboration-service
    ports:
      - "8084:8084"
  # 5. User Service
  user-service:
    build: ./services/user-service
    ports:
      - "8080:8080"
    env_file:
      - ./services/user-service/.env
    volumes:
      - ./services/user-service:/usr/src/app
      - /usr/src/app/node_modules
    restart: always
    
  # 6. Frontend (Next.js)
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_MATCHING_SERVICE_URL=http://localhost:8082
    volumes:
      - ./frontend:/app
      - /app/node_modules # Don't overwrite node_modules with local ones
    depends_on:
      - matching-service
  
  # 7. API Gateway
  gateway:
    build: ./gateway
    ports:
      - "5001:5001"
    volumes:
      - ./gateway:/usr/src/app
      - /usr/src/app/node_modules
    restart: always