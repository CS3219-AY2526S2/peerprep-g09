services:
  # 1. Redis Database
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  # 2. Question Service
  question-service:
    build: ./services/question-service
    ports:
      - "8081:8081"
    environment:
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY:-peerprep-dev-internal-key}
  
  # 3. Matching Service
  matching-service:
    build: ./services/matching-service
    ports:
      - "8082:8082"
    environment:
      - REDIS_URL=redis://redis:6379
      - QUESTION_SERVICE_URL=http://question-service:8081 # Adjust if needed
    depends_on:
      - redis
      - question-service

  # 4. Collaboration Service
  collaboration-service:
    build: ./services/collaboration-service
    ports:
      - "8084:8084"
    environment:
      - QUESTION_SERVICE_URL=http://question-service:8081
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY:-peerprep-dev-internal-key}
    depends_on:
      - question-service
  # 5. User Service
  user-service:
    build: 
      context: ./services/user-service
      dockerfile: Dockerfile
    volumes:
      - ./services/user-service:/usr/src/app
      - /usr/src/app/node_modules 
    environment:
      - NODE_ENV=development
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_USER=${EMAIL_USER}
      - TEST_RECIPIENT_EMAIL=${TEST_RECIPIENT_EMAIL}
    ports:
      - "8080:8080"
    
  # 6. Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY}
        - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        - NEXT_PUBLIC_FIREBASE_APP_ID=${NEXT_PUBLIC_FIREBASE_APP_ID}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - matching-service
  
  # 7. API Gateway
  gateway:
    build: ./gateway
    ports:
      - "5001:5001"
    volumes:
      - ./gateway:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - USER_SERVICE_URL=http://user-service:8080
      - MATCHING_SERVICE_URL=http://matching-service:8082
      - QUESTION_SERVICE_URL=http://question-service:8081
    restart: always
    depends_on:
      - user-service
      - matching-service
