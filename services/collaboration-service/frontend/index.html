<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PeerPrep | Collaborative Workspace</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header id="navbar">
        <div class="logo">PeerPrep</div>
        <div class="actions">
            <span id="timer-display">Time left: </span>
            <button id="exit-btn">Exit</button>
            <span id="connection-status" class="status-offline">Offline</span>
        </div>
    </header>

    <main id="workspace">
        <section id="question-panel">
            <div class="panel-content">
                <h2>Qn goes here</h2>
            </div>
        </section>

        <section id="editor-panel">
            <div id="editor-container"></div>
        </section>
    </main>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <script src="/script.js"></script>
</body>
</html>
